# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true

# Если сборка падает на «Could not read workspace metadata … transforms-4\...\metadata.bin»:
# 1) Закройте IDE, выполните в каталоге проекта:  powershell -ExecutionPolicy Bypass -File .\fix-gradle-transforms-cache.ps1
# 2) Либо всегда собирайте через  gradlew-local.cmd  (свой GRADLE_USER_HOME в .gradle-user-home — см. .gitignore).

# Android Gradle Plugin 8.9.x (targetSdk 36) требует Java 17+ для процесса Gradle.
# Если сборка падает с ошибкой «compatible with Java 8/11», закройте IDE, выполните gradlew --stop,
# укажите JDK 17 в JAVA_HOME или раскомментируйте строку с путём к JBR из Android Studio:
# org.gradle.java.home=C:\\Program Files\\Android\\Android Studio\\jbr

# Android settings
android.useAndroidX=true
android.nonTransitiveRClass=true

# Kotlin settings
kotlin.code.style=official

# Fix for jlink.exe issues with JBR
android.experimental.enableNewJdkImageTransformForJDKImageWithModules=false
