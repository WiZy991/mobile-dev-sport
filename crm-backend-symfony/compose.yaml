
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm_backend_app
    restart: unless-stopped
    env_file:
      - .env
      - .env.dev
    # С compose.https.yaml порт 80/443 открывает только nginx. Здесь только отладочный 8000 на хосте.
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
    command: sh -c "php bin/console doctrine:database:create --if-not-exists --no-interaction && php bin/console doctrine:schema:update --force --no-interaction && php -S 0.0.0.0:8000 -t public"
    networks:
      - crm_backend_net

  database:
    image: mysql:8.0
    container_name: crm_backend_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: world_fitness
      MYSQL_USER: app
      MYSQL_PASSWORD: app_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uapp", "-papp_password"]
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - database_data:/var/lib/mysql
    networks:
      - crm_backend_net

networks:
  crm_backend_net:
    name: crm_backend_symfony_net
    driver: bridge

volumes:
  database_data:
