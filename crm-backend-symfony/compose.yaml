
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm_backend_app
    restart: unless-stopped
    env_file:
      - .env
    # С compose.https.yaml порт 80/443 открывает только nginx. Здесь только отладочный 8000 на хосте.
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
    command: sh -c "php bin/console doctrine:database:create --if-not-exists --no-interaction && php bin/console doctrine:migrations:migrate --no-interaction && php -S 0.0.0.0:8000 -t public public/index.php"
    # Опционально: дополнительные секреты монтируются внутрь приложения как /app/var/secrets (не для бандлового сертификата etc/sber из образа).
    volumes:
      - ./var/secrets:/app/var/secrets:ro
    networks:
      - crm_backend_net

  database:
    image: mysql:8.0
    container_name: crm_backend_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: world_fitness
      MYSQL_USER: app
      MYSQL_PASSWORD: app_password
      MYSQL_ROOT_PASSWORD: root_password
    # Порт 3306 не публикуется наружу — только docker-сеть (безопасность / опросник ДКБ).
    # Для локальной отладки: COMPOSE_FILE=compose.yaml:compose.dev.yaml
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uapp", "-papp_password"]
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - database_data:/var/lib/mysql
    networks:
      - crm_backend_net

networks:
  crm_backend_net:
    name: crm_backend_symfony_net
    driver: bridge

volumes:
  database_data:
