# TLS-terminator → PHP built-in server в контейнере app:8000.
# Замените server_name на свой домен (должен совпадать с CN/SAN сертификата).
#
# proxy_pass через переменную + resolver 127.0.0.11 — DNS Docker резолвится в runtime,
# а не при старте nginx (иначе «host not found in upstream app:8000», если app ещё не поднялся).

server {
    listen 80;
    listen [::]:80;
    server_name worldcashfit.ru www.worldcashfit.ru dobrozal.ru www.dobrozal.ru;

    # Let's Encrypt (certbot --webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name worldcashfit.ru www.worldcashfit.ru dobrozal.ru www.dobrozal.ru;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    client_max_body_size 32m;

    location / {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $crm_upstream http://app:8000;
        proxy_pass $crm_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;
        proxy_set_header Connection "";
    }
}
