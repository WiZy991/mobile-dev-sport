api_auth_login:
  path: /api/v1/auth/login
  controller: App\Controller\Api\AuthController::login
  methods: [POST]

api_auth_register:
  path: /api/v1/auth/register
  controller: App\Controller\Api\AuthController::register
  methods: [POST]

api_auth_refresh:
  path: /api/v1/auth/refresh
  controller: App\Controller\Api\AuthController::refresh
  methods: [POST]

api_auth_logout:
  path: /api/v1/auth/logout
  controller: App\Controller\Api\AuthController::logout
  methods: [POST]

api_user_profile_get:
  path: /api/v1/user/profile
  controller: App\Controller\Api\UserController::profile
  methods: [GET]

api_user_profile_update:
  path: /api/v1/user/profile
  controller: App\Controller\Api\UserController::updateProfile
  methods: [PUT]

