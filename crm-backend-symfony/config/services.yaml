# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # Пустой redirect по умолчанию, если переменная не задана (см. env var processors).
    sber_id_mobile_redirect_default: ''
    # Значение по умолчанию для bind SberAuthController::$nativeAppBridgeUri (%env(default:sber_native_app_bridge_default:SBER_ID_NATIVE_APP_BRIDGE_URI)%).
    sber_native_app_bridge_default: 'worldfitness://auth/callback'
    # Проверка TLS к API Сбера (1/ true = вкл.). Если в сети подмена HTTPS — см. комментарий у SBER_ID_SSL_VERIFY в .env
    sber_id_ssl_verify_default: true
    sber_id_mtls_pkcs12_default: ''
    sber_id_mtls_pass_default: ''
    # Scope авторизации OIDC — набор должен быть подключён в кабинете Сбер ID (см. WorldFitness/instruction.txt).
    sber_id_oidc_scope_default: 'openid profile email mobile name birthdate gender maindoc priority_doc'
    mobile_api_access_ttl_default: 3600
    sber_userinfo_log_default: false
    fcm_server_key_default: ''

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\Service\Admin\SberIdOAuthService:
        arguments:
            $clientId: '%env(SBER_ID_CLIENT_ID)%'
            $clientSecret: '%env(SBER_ID_CLIENT_SECRET)%'
            $authorizeUrl: '%env(SBER_ID_AUTHORIZE_URL)%'
            $tokenUrl: '%env(SBER_ID_TOKEN_URL)%'
            $userInfoUrl: '%env(string:SBER_ID_USERINFO_URL)%'
            $verifySsl: '%env(bool:default:sber_id_ssl_verify_default:SBER_ID_SSL_VERIFY)%'
            $mtlsPkcs12Path: '%env(default:sber_id_mtls_pkcs12_default:SBER_ID_MTLS_PKCS12)%'
            $mtlsPkcs12Password: '%env(default:sber_id_mtls_pass_default:SBER_ID_MTLS_PKCS12_PASS)%'
            $oidcAuthorizeScope: '%env(default:sber_id_oidc_scope_default:SBER_ID_OIDC_SCOPE)%'

    App\Service\Api\SberOAuthPkceStateService:
        arguments:
            $secret: '%kernel.secret%'

    App\Controller\Api\SberAuthController:
        bind:
            $nativeRedirectUri: '%env(string:SBER_ID_NATIVE_REDIRECT_URI)%'
            $nativeAppBridgeUri: '%env(default:sber_native_app_bridge_default:SBER_ID_NATIVE_APP_BRIDGE_URI)%'
            $sberClientId: '%env(SBER_ID_CLIENT_ID)%'

    App\Controller\Admin\AdminSberIdController:
        bind:
            $sberRedirectUri: '%env(SBER_ID_REDIRECT_URI)%'

    App\Service\Api\SberMobileOAuthStateService:
        arguments:
            $secret: '%kernel.secret%'

    App\Service\Api\SberMobileAuthService:
        arguments:
            $mobileRedirectUri: '%env(default:sber_id_mobile_redirect_default:SBER_ID_MOBILE_REDIRECT_URI)%'

    App\Service\Api\MobileAuthTokenIssuer:
        arguments:
            $accessTokenTtlSeconds: '%env(int:default:mobile_api_access_ttl_default:MOBILE_API_ACCESS_TTL)%'

    App\Service\Api\SberIdTokenValidator:
        arguments:
            $clientId: '%env(SBER_ID_CLIENT_ID)%'

    App\Service\Api\SberIdUserinfoJsonLogger:
        arguments:
            $projectDir: '%kernel.project_dir%'
            $enabled: '%env(bool:default:sber_userinfo_log_default:SBER_USERINFO_LOG)%'

    App\Controller\Api\SubscriptionController:
        bind:
            $requireSberVerificationBeforePurchase: '%env(bool:SUBSCRIPTION_REQUIRE_SBER)%'

    App\Controller\Api\AccessController:
        bind:
            $accessGateToken: '%env(ACCESS_GATE_TOKEN)%'
            $percoOpenFromCrm: '%env(PERCO_OPEN_FROM_CRM)%'

    App\Service\Integration\PercoWebClient:
        bind:
            $percoOpenFromCrm: '%env(PERCO_OPEN_FROM_CRM)%'

    App\Service\Push\FcmPushSender:
        arguments:
            $serverKey: '%env(default:fcm_server_key_default:FCM_SERVER_KEY)%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
