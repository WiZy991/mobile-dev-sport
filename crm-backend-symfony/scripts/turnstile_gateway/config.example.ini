; Скопируйте в config.ini рядом со скриптом и заполните под ваш клуб.
; Любая опция переопределяется переменной окружения `<СЕКЦИЯ>_<КЛЮЧ>` в верхнем регистре.
; Пример: CRM_BASE_URL, CRM_GATEWAY_TOKEN, PERCO_BASE_URL.

[crm]
; Публичный адрес облачного CRM (без слэша на конце).
base_url = https://crm.worldcashfit.ru

; Токен этого клуба, скопированный из админки CRM
; (Настройки → Франшиза → клуб → «Сгенерировать токен»).
gateway_token = REPLACE_ME

; Метка устройства, которая попадёт в access_logs.device_id (для удобства фильтрации).
device_id = club-1-gateway

; Самоподписанный сертификат CRM на стенде → 0; в проде оставляйте 1.
verify_ssl = 1

; Период heartbeat (секунды) и ожидание long-poll команд.
heartbeat_interval = 30
poll_timeout_seconds = 35
long_poll_backoff_seconds = 5

[perco]
; Локальный адрес PERCo-Web в LAN клуба (ПК с установленным PERCo-Web, не CRM и не 127.0.0.1 на VPS).
; Проверка: curl -k -X POST "<base_url>/api/system/auth" -H "Content-Type: application/json" -d '{"login":"...","password":"..."}'
; Если ответ Symfony/HTML — вы стучитесь не в PERCo-Web.
; Если PERCo нет — оставьте пустым, шлюз будет только stdin/CRM.
base_url = http://192.168.0.10:8443
login = admin
password = REPLACE_ME
verify_ssl = 0

; ID исполнительного устройства (турникет / замок).
; Список можно посмотреть командой:
;   python3 gateway.py healthcheck   ; затем в перко-веб GET /api/devices
entry_device_id = 696590

; Параметры команды «открыть» — зависят от модели контроллера PERCo.
; Значения по умолчанию (в коде) — 1 / 1 / 1 / 0; типовые в примерах PERCo
; для импульсного открытия — cmd_value=3, cmd_param=5000.
;cmd_number = 1
;cmd_type   = 1
;cmd_value  = 3
;cmd_param  = 5000


base_url = http://127.0.0.1
login = root
password = Wcb12345@!
verify_ssl = 0
events_enabled = 1
events_poll_interval = 1
events_page_size = 50
only_fitnessclub_qr = 1