; Скопируйте в config.ini рядом со скриптом и заполните под ваш клуб.
; Любая опция переопределяется переменной окружения `<СЕКЦИЯ>_<КЛЮЧ>` в верхнем регистре.
; Пример: CRM_BASE_URL, CRM_GATEWAY_TOKEN, PERCO_BASE_URL.

[crm]
; Публичный адрес облачного CRM (без слэша на конце, без хвоста /api).
base_url = https://crm.worldcashfit.ru

; Токен этого клуба, скопированный из админки CRM
; (Настройки → Франшиза → клуб → «Сгенерировать токен»).
gateway_token = 5d6c38978d95d3690ece14caff8540f2aac4f42cf5930a28

; Метка устройства, которая попадёт в access_logs.device_id (для удобства фильтрации).
device_id = club-1-gateway

; Самоподписанный сертификат CRM на стенде → 0; в проде оставляйте 1.
verify_ssl = 1

; Период heartbeat (секунды) и ожидание long-poll команд.
heartbeat_interval = 30
poll_timeout_seconds = 35
long_poll_backoff_seconds = 5

[perco]
; PERCo-Web на ПК клуба. Один ПК в зале: можно http://127.0.0.1 (если PERCo слушает 80).
; Если шлюз на другой машине в LAN — укажите IP ПК с PERCo-Web, например https://192.168.0.10:8443
; Проверка PERCo (подставьте base_url / логин / пароль):
;   Только PowerShell: curl.exe -k -X POST "https://127.0.0.1/api/system/auth" -H "Content-Type: application/json" -d '{"login":"root","password":"ПАРОЛЬ"}'
;   В cmd.exe одинарные кавычки НЕ работают как в bash — будет 400 JSON parse. В CMD: setlocal DisableDelayedExpansion
;     затем curl.exe ... -d "{\"login\":\"root\",\"password\":\"ПАРОЛЬ\"}"  ИЛИ  -d @C:\path\perco-auth.json (файл с чистым JSON).
; Ответ с JSON token = PERCo-Web; HTML с SyntaxError = битое тело запроса или не тот сервер.
base_url = https://127.0.0.1
login = root
password = Wcb12345@!
verify_ssl = 0

; ID исполнительного устройства (турникет / замок). Подставьте свой из PERCo-Web.
entry_device_id = 696590

; Параметры команды «открыть» — зависят от модели контроллера PERCo.
;cmd_number = 1
;cmd_type   = 1
;cmd_value  = 3
;cmd_param  = 5000

; Сканер на контроллере PERCo (не USB ПК): поллинг событий identifications.
events_enabled = 1
events_poll_interval = 1
events_page_size = 50
only_fitnessclub_qr = 1
