# Подключение HTTPS через nginx перед приложением:
#   bash scripts/deploy-https.sh
# или вручную:
#   bash scripts/nginx-self-signed-certs.sh
#   COMPOSE_FILE=compose.yaml:compose.https.yaml docker compose up -d --build
#
# Если «Bind for 0.0.0.0:80 failed: port is already allocated» — на хосте уже слушает
# nginx/apache или другой контейнер. deploy-https.sh останавливает их автоматически.
# Продакшен (Let's Encrypt): смонтируйте fullchain.pem и privkey.pem в ./docker/nginx/certs/
# или замените volume в этом файле на путь /etc/letsencrypt/live/<домен>/...

services:
  # Только nginx публикует 80/443 на хост. app доступен снаружи лишь на :8000 (отладка).
  # Если app мапит 80:8000 (старый прод без nginx) — nginx не стартует: «port is already allocated».
  app:
    ports:
      - "8000:8000"

  nginx:
    image: nginx:alpine
    container_name: crm_backend_nginx
    restart: unless-stopped
    networks:
      - crm_backend_net
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
      - ./docker/nginx/certbot-webroot:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_started
